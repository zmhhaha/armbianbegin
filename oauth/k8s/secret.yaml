apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: oauth
type: Opaque
stringData:
  # Cookie 加密密钥（32 字节 = 64 hex 字符）
  #   openssl rand -hex 16   → 32 chars  32 字节 ✅
  # 注意: 不能用 openssl rand -base64 32（44 chars ❌）或 -hex 32（64 chars ❌）
  COOKIE_SECRET: "change-me-use-openssl-rand-hex-16"

  # Casdoor OIDC 客户端凭证
  OIDC_CLIENT_ID: "oauth2-proxy-client-id"
  OIDC_CLIENT_SECRET: "oauth2-proxy-client-secret"
  # Casdoor origin = https://auth.panghuer.top
  # oauth2-proxy 通过 CF Tunnel 访问 Casdoor OIDC（需 --ssl-insecure-skip-verify）
  OIDC_ISSUER_URL: "https://auth.panghuer.top"

  # 邮箱域名白名单（"*" = 允许所有）
  ALLOWED_DOMAINS: "*"
