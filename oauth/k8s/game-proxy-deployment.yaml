# ============================================================
#  oauth2-proxy 认证代理部署模板 — School of One 游戏版
#  区别于 agent 版（7860 Gradio），游戏前端是 80 Nginx
#  域名固定为 __TARGET_NAME__.panghuer.top
#  部署：
#    sed "s/__TARGET_NAME__/school-of-one/g" game-proxy-deployment.yaml | kubectl apply -f -
# ============================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-__TARGET_NAME__
  namespace: oauth
  labels:
    app: oauth2-proxy-__TARGET_NAME__
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy-__TARGET_NAME__
  template:
    metadata:
      labels:
        app: oauth2-proxy-__TARGET_NAME__
    spec:
      containers:
      - name: oauth2-proxy
        image: arm-cluster-master:5000/oauth2-proxy:v7.8.0
        imagePullPolicy: Always
        args:
          - "--alpha-config=/etc/oauth2-proxy/alpha-config.yaml"
          - "--cookie-secret=$(COOKIE_SECRET)"
          - "--cookie-domain=.panghuer.top"
          - "--cookie-secure=true"
          - "--cookie-samesite=lax"
          - "--cookie-expire=168h"
          - "--cookie-refresh=60m"
          - "--cookie-name=_oauth2_proxy"
          - "--email-domain=$(ALLOWED_DOMAINS)"
          - "--redirect-url=https://__TARGET_NAME__.panghuer.top/oauth2/callback"
          - "--reverse-proxy=true"
          - "--silence-ping-logging=true"
          - "--ssl-insecure-skip-verify=true"
        ports:
        - containerPort: 4180
          name: http
        - containerPort: 44180
          name: metrics
        envFrom:
        - secretRef:
            name: oauth2-proxy-secret
        volumeMounts:
        - name: config
          mountPath: /etc/oauth2-proxy
          readOnly: true
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {cpu: 200m, memory: 256Mi}
        livenessProbe:
          httpGet: {path: /ping, port: 4180}
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /ping, port: 4180}
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: oauth2-proxy-config-__TARGET_NAME__
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-__TARGET_NAME__
  namespace: oauth
  labels:
    app: oauth2-proxy-__TARGET_NAME__
spec:
  selector:
    app: oauth2-proxy-__TARGET_NAME__
  ports:
  - port: 4180
    targetPort: 4180
    name: http
  - port: 44180
    targetPort: 44180
    name: metrics
