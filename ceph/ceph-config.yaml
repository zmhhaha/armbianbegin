# ceph-config.yaml — Ceph 集群配置（CSI 驱动挂载用）
# 用法: kubectl create configmap ceph-config -n default --from-file=ceph.conf=/etc/ceph/ceph.conf --from-literal=keyring=
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-config
  namespace: default
data:
  ceph.conf: |
    [global]
    fsid = 3a4899f0-7689-11f1-90a0-c0742bfe683a
    mon_host = [v2:192.168.137.101:3300/0,v1:192.168.137.101:6789/0] [v2:192.168.137.201:3300/0,v1:192.168.137.201:6789/0] [v2:192.168.137.202:3300/0,v1:192.168.137.202:6789/0] [v2:192.168.137.203:3300/0,v1:192.168.137.203:6789/0] [v2:192.168.137.211:3300/0,v1:192.168.137.211:6789/0]
    auth_cluster_required = cephx
    auth_service_required = cephx
    auth_client_required = cephx
  # keyring 必须存在，值为空（CSI 驱动启动时会写入）
  keyring: |
