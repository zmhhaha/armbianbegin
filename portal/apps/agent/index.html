<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐯 Panghu Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{text-align:center;padding:60px 20px 20px}
.header h1{font-size:2.5em;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.header p{color:#94a3b8;font-size:1.1em}
.section{max-width:1200px;margin:0 auto;padding:20px 20px 0}
.section h2{font-size:1.3em;color:#94a3b8;margin-bottom:12px;padding-left:8px;border-left:3px solid #60a5fa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;max-width:1200px;margin:0 auto;padding:12px 20px 40px}
.card{background:#1e293b;border-radius:16px;padding:32px;border:1px solid #334155;transition:all .2s;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:#60a5fa;transform:translateY(-2px);box-shadow:0 8px 30px rgba(96,165,250,.15)}
.card .icon{font-size:2.5em;margin-bottom:16px}
.card h3{font-size:1.2em;margin-bottom:8px;color:#f1f5f9}
.card p{color:#94a3b8;line-height:1.6;margin-bottom:16px}
.card .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8em;background:rgba(96,165,250,.15);color:#60a5fa}
.card .tags{display:flex;gap:8px;flex-wrap:wrap}
.footer{text-align:center;padding:20px;color:#475569;font-size:.85em}
</style>
</head>
<body>
<div class="header">
  <h1>🐯 Panghu Hub</h1>
  <p>一个入口，连接所有服务</p>
</div>

<div class="section"><h2>🤖 Agents</h2></div>
<div class="grid">
  <a href="https://research-agent.panghuer.top" class="card">
    <div class="icon">🔬</div>
    <h3>研究助手</h3>
    <p>多 Agent 协作调研。输入主题，研究员搜集信息、分析师提炼洞察、撰写者输出报告。</p>
    <div class="tags">
      <span class="tag">CrewAI</span>
      <span class="tag">DeepSeek</span>
      <span class="tag">研究报告</span>
    </div>
  </a>
  <!-- 新 Agent 卡片模板：
  <a href="https://xxx.panghuer.top" class="card">
    <div class="icon">🎯</div>
    <h3>名字</h3>
    <p>描述</p>
    <div class="tags"><span class="tag">标签</span></div>
  </a>
  -->
</div>

<!-- 后续添加其他类型服务：
<div class="section"><h2>🛠️ Tools</h2></div>
<div class="grid">...</div>

<div class="section"><h2>📊 Dashboards</h2></div>
<div class="grid">...</div>
-->

<div class="footer">Powered by ArmbianBegin &copy; 2026</div>
</body>
</html>
