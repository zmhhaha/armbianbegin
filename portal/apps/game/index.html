<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Panghu Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{text-align:center;padding:60px 20px 20px}
.header h1{font-size:2.5em;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.header p{color:#94a3b8;font-size:1.1em}
.section{max-width:1200px;margin:0 auto;padding:20px 20px 0}
.section h2{font-size:1.3em;color:#94a3b8;margin-bottom:12px;padding-left:8px;border-left:3px solid #f59e0b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;max-width:1200px;margin:0 auto;padding:12px 20px 40px}
.card{background:#1e293b;border-radius:16px;padding:32px;border:1px solid #334155;transition:all .2s;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,158,11,.15)}
.card .icon{font-size:2.5em;margin-bottom:16px}
.card h3{font-size:1.2em;margin-bottom:8px;color:#f1f5f9}
.card p{color:#94a3b8;line-height:1.6;margin-bottom:16px}
.card .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8em;background:rgba(245,158,11,.15);color:#f59e0b}
.card .tags{display:flex;gap:8px;flex-wrap:wrap}
.footer{text-align:center;padding:20px;color:#475569;font-size:.85em}
</style>
</head>
<body>
<div class="header">
  <h1>🎮 Panghu Game</h1>
  <p>学习之余，放松一下</p>
</div>

<div class="section"><h2>🎯 Games</h2></div>
<div class="grid">
  <a href="https://school-of-one.panghuer.top" class="card">
    <div class="icon">🐉</div>
    <h3>自成一派</h3>
    <p>School of One · 以中华武术为题材的卡牌对战 + AI 辅助招式训练游戏。拜师学艺、自创卡组、擂台对决。</p>
    <div class="tags">
      <span class="tag">卡牌</span>
      <span class="tag">武侠</span>
      <span class="tag">AI</span>
    </div>
  </a>
  <a href="https://game-1.panghuer.top" class="card">
    <div class="icon">🕹️</div>
    <h3>游戏一</h3>
    <p>游戏描述，这里先放个占位，后续可以替换为具体游戏</p>
    <div class="tags">
      <span class="tag">待开发</span>
    </div>
  </a>
  <a href="https://game-2.panghuer.top" class="card">
    <div class="icon">🎲</div>
    <h3>游戏二</h3>
    <p>游戏描述，这里先放个占位，后续可以替换为具体游戏</p>
    <div class="tags">
      <span class="tag">待开发</span>
    </div>
  </a>
  <!-- 新游戏卡片模板：
  <a href="https://xxx.panghuer.top" class="card">
    <div class="icon">🎯</div>
    <h3>名字</h3>
    <p>描述</p>
    <div class="tags"><span class="tag">标签</span></div>
  </a>
  -->
</div>

<div class="section"><h2>❤️ 支持作者</h2></div>
<div class="donate-section" style="max-width:900px;margin:0 auto;padding:20px">
  <div class="donate-tabs" style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">
    <div class="donate-tab active" style="padding:10px 28px;border-radius:24px;background:#1e293b;border:1px solid #334155;color:#94a3b8;cursor:pointer;transition:all .2s;font-size:1em;user-select:none" onclick="switchTab('tab1')">💰️ 1 毛</div>
    <div class="donate-tab" style="padding:10px 28px;border-radius:24px;background:#1e293b;border:1px solid #334155;color:#94a3b8;cursor:pointer;transition:all .2s;font-size:1em;user-select:none" onclick="switchTab('tab2')">💰️ 2 毛</div>
    <div class="donate-tab" style="padding:10px 28px;border-radius:24px;background:#1e293b;border:1px solid #334155;color:#94a3b8;cursor:pointer;transition:all .2s;font-size:1em;user-select:none" onclick="switchTab('tab5')">💰️ 5 毛</div>
  </div>
  <div class="donate-qr show" id="tab1" style="display:flex;justify-content:center;gap:32px;flex-wrap:wrap">
    <div class="qr-card" style="background:#1e293b;border-radius:16px;padding:24px;border:1px solid #334155;text-align:center;min-width:200px">
      <div class="qr-label" style="font-size:1em;margin-bottom:12px;color:#3b82f6">💙 支付宝 1 毛</div>
      <img src="https://panghuer.top/static/alipay0.1.jpg" alt="支付宝 1 毛" loading="lazy" style="width:180px;border-radius:12px">
    </div>
  </div>
  <div class="donate-qr" id="tab2" style="display:none;justify-content:center;gap:32px;flex-wrap:wrap">
    <div class="qr-card" style="background:#1e293b;border-radius:16px;padding:24px;border:1px solid #334155;text-align:center;min-width:200px">
      <div class="qr-label" style="font-size:1em;margin-bottom:12px;color:#3b82f6">💙 支付宝 2 毛</div>
      <img src="https://panghuer.top/static/alipay0.2.jpg" alt="支付宝 2 毛" loading="lazy" style="width:180px;border-radius:12px">
    </div>
  </div>
  <div class="donate-qr" id="tab5" style="display:none;justify-content:center;gap:32px;flex-wrap:wrap">
    <div class="qr-card" style="background:#1e293b;border-radius:16px;padding:24px;border:1px solid #334155;text-align:center;min-width:200px">
      <div class="qr-label" style="font-size:1em;margin-bottom:12px;color:#3b82f6">💙 支付宝 5 毛</div>
      <img src="https://panghuer.top/static/alipay0.5.jpg" alt="支付宝 5 毛" loading="lazy" style="width:180px;border-radius:12px">
    </div>
  </div>
</div>

<div class="footer">Powered by ArmbianBegin &copy; 2026</div>
<script>
function switchTab(id) {
  document.querySelectorAll('.donate-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.donate-qr').forEach(q => q.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}
</script>
</body>
</html>
