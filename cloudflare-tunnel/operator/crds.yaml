# ============================================================
#  Cloudflare Tunnel Operator — CRD 定义
# ============================================================
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnels.cf.armbianbegin.io
spec:
  group: cf.armbianbegin.io
  names:
    kind: Tunnel
    listKind: TunnelList
    plural: tunnels
    singular: tunnel
    shortNames: [ct]
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              tunnelToken:
                type: string
              replicas:
                type: integer
                default: 2
              image:
                type: string
              extraArgs:
                type: array
                items:
                  type: string
              metricsPort:
                type: integer
                default: 2001
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Status
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnelroutes.cf.armbianbegin.io
spec:
  group: cf.armbianbegin.io
  names:
    kind: TunnelRoute
    listKind: TunnelRouteList
    plural: tunnelroutes
    singular: tunnelroute
    shortNames: [ctr]
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              tunnelRef:
                type: string
              hostname:
                type: string
              backend:
                type: string
              path:
                type: string
    additionalPrinterColumns:
    - name: Tunnel
      type: string
      jsonPath: .spec.tunnelRef
    - name: Hostname
      type: string
      jsonPath: .spec.hostname
    - name: Backend
      type: string
      jsonPath: .spec.backend
