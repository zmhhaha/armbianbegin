# ============================================================
#  Operator 自身部署
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cf-tunnel-operator
  namespace: cf-tunnel-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cf-tunnel-operator
  template:
    metadata:
      labels:
        app: cf-tunnel-operator
    spec:
      serviceAccountName: cf-tunnel-operator
      containers:
      - name: operator
        image: arm-cluster-master:5000/cf-tunnel-operator:latest
        imagePullPolicy: Always
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits:   {cpu: 500m, memory: 512Mi}
