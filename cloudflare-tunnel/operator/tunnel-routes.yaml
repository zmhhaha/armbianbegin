# ============================================================
#  正式 Tunnel + 路由（生产环境）
#  kubectl apply -f tunnel-routes.yaml
# ============================================================
---
apiVersion: cf.armbianbegin.io/v1
kind: Tunnel
metadata:
  name: main
  namespace: default
spec:
  tunnelToken: cf-tunnel-token
  replicas: 2
---
# agent-portal 首页
apiVersion: cf.armbianbegin.io/v1
kind: TunnelRoute
metadata:
  name: agent-portal
  namespace: default
spec:
  tunnelRef: main
  hostname: agent.panghuer.top
  backend: portal.agent-portal.svc.cluster.local:80
---
# 研究助手 UI
apiVersion: cf.armbianbegin.io/v1
kind: TunnelRoute
metadata:
  name: research-ui
  namespace: default
spec:
  tunnelRef: main
  hostname: research-agent.panghuer.top
  backend: oauth2-proxy-research-agent.oauth.svc.cluster.local:4180
---
# 科研综述 UI
apiVersion: cf.armbianbegin.io/v1
kind: TunnelRoute
metadata:
  name: scientific-ui
  namespace: default
spec:
  tunnelRef: main
  hostname: scientific-agent.panghuer.top
  backend: oauth2-proxy-scientific-agent.oauth.svc.cluster.local:4180
---
# School of One
apiVersion: cf.armbianbegin.io/v1
kind: TunnelRoute
metadata:
  name: school-of-one
  namespace: default
spec:
  tunnelRef: main
  hostname: school-of-one.panghuer.top
  backend: oauth2-proxy-school-of-one.oauth.svc.cluster.local:80
