---
# =============================================================
# Tunnel Credentials Secret
# =============================================================
# 三种使用方式选其一（按优先级）：
#
# --- 方式 1：TUNNEL_TOKEN（推荐，最简单）---
# 1. 去 Cloudflare Zero Trust → Networks → Tunnels → 创建 Tunnel
# 2. 选择 Docker 部署方式，复制 token
# 3. kubectl create secret generic tunnel-credentials \
#      --from-literal=token="eyJh..." \
#      -n cloudflare-tunnel
#
# --- 方式 2：config.yml（ConfigMap 挂载）---
# 创建 tunnel: cloudflared tunnel create <name>
# 将生成的 credentials.json 创建为 secret
#
# --- 方式 3：credentials.json ---
# 将 credentials.json 的内容 base64 编码后填入下方
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: tunnel-credentials
  namespace: cloudflare-tunnel
  labels:
    app.kubernetes.io/name: cloudflared
type: Opaque
data:
  # 方式 1：只填 token（推荐），使用环境变量 TUNNEL_TOKEN 注入
  token: ""

  # 方式 2/3：填 credentials.json 的内容
  # credentials.json: '{"AccountTag":"abc...","TunnelSecret":"xyz...","TunnelID":"uuid","TunnelName":"my-tunnel"}'
  credentials.json: ""
