---
# =============================================================
# cloudflared Service — 暴露 Metrics（供 Prometheus 抓取）
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  namespace: cloudflare-tunnel
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  clusterIP: None                    # Headless service
  selector:
    app.kubernetes.io/name: cloudflared
  ports:
    - name: metrics
      port: 2001
      targetPort: 2001
      protocol: TCP
---
# =============================================================
