# ============================================================
#  Gradio K8s 部署模板
#  替换所有 <...> 占位符为你的实际值
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: gradio-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gradio-config
  namespace: gradio-app
data:
  GRADIO_SERVER_PORT: "7860"
---
apiVersion: v1
kind: Secret
metadata:
  name: gradio-secret
  namespace: gradio-app
type: Opaque
stringData: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradio-app
  namespace: gradio-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gradio-app
  template:
    metadata:
      labels:
        app: gradio-app
    spec:
      containers:
      - name: gradio
        image: arm-cluster-master:5000/gradio-app:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 7860
        envFrom:
        - configMapRef:
            name: gradio-config
        - secretRef:
            name: gradio-secret
        resources:
          requests: {cpu: 250m, memory: 256Mi}
          limits:   {cpu: 1000m, memory: 1Gi}
        livenessProbe:
          httpGet: {path: /, port: 7860}
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /, port: 7860}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gradio-app
  namespace: gradio-app
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 7860
    targetPort: 7860
  selector:
    app: gradio-app
