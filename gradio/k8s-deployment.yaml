# ============================================================
#  Generic Agent UI 部署模板（Gradio）
#  deploy.sh 会将 __AGENT_NAME__ 替换为实际 agent 名
#  Gradio 内部引用绝对路径，如果要放在路径下需配合 rewrite
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: __AGENT_NAME__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: __AGENT_NAME__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __AGENT_NAME__-ui
  template:
    metadata:
      labels:
        app: __AGENT_NAME__-ui
    spec:
      containers:
      - name: ui
        image: arm-cluster-master:5000/gradio-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7860
        env:
        - name: API_BASE
          value: "http://api.research-agent.svc.cluster.local"
        - name: PROVIDER
          value: deepseek
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-secret
              key: OPENAI_API_KEY
              optional: true
        resources:
          requests: {cpu: 250m, memory: 512Mi}
          limits: {cpu: 2000m, memory: 2Gi}
        livenessProbe:
          httpGet: {path: /, port: 7860}
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /, port: 7860}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: __AGENT_NAME__
spec:
  selector:
    app: __AGENT_NAME__-ui
  ports:
  - port: 7860
