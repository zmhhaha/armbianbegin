# 部署 Drone Server
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: drone-server
  namespace: gitops
spec:
  serviceName: drone-server
  replicas: 1
  selector:
    matchLabels:
      app: drone-server
  template:
    metadata:
      labels:
        app: drone-server
    spec:
      containers:
      - name: drone-server
        image: nanopct4-master:5000/drone:2.21
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: drone-env
        volumeMounts:
        - name: drone-data
          mountPath: /data
  volumeClaimTemplates:  # 每个 Pod 自动创建独立 PVC
  - metadata:
      name: drone-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: ceph-rbd  # RBD 存储类
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: drone-server
  namespace: gitops
spec:
  selector:
    app: drone-server
  ports:
  - port: 8080
    targetPort: 8080
---
# 部署 Drone Runner
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drone-runner
  namespace: gitops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drone-runner
  template:
    metadata:
      labels:
        app: drone-runner
    spec:
      serviceAccountName: drone-runner-sa  # 需要特殊权限
      containers:
      - name: runner
        image: nanopct4-master:5000/drone-runner-kube:latest-linux-arm64
        envFrom:
        - configMapRef:
            name: drone-env
        securityContext:
          privileged: true  # 允许挂载 Docker socket
---
# 创建 ServiceAccount 和权限
apiVersion: v1
kind: ServiceAccount
metadata:
  name: drone-runner-sa
  namespace: gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: drone-runner-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "secrets"]
  verbs: ["get", "create", "delete", "list", "watch", "update"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: drone-runner-binding
subjects:
- kind: ServiceAccount
  name: drone-runner-sa
  namespace: gitops
roleRef:
  kind: ClusterRole
  name: drone-runner-role
  apiGroup: rbac.authorization.k8s.io