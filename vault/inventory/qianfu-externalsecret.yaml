# ============================================================
# QianFu — ExternalSecret
# 从 Vault 同步 QianFu 运行时所需的数据库连接信息到 Kubernetes Secret
#
# 说明:
#   QianFu 使用共享 PostgreSQL 服务，但只使用独立的 qianfu schema。
#   本文件不会创建数据库、修改数据库表，也不会保存任何明文密码。
#   PostgreSQL 密码由现有 secret/data/postgres/app 统一管理。
#
# 前置条件:
#   1. External Secrets Operator 已安装并运行。
#   2. ClusterSecretStore/vault-backend 状态为 Ready。
#   3. qianfu Namespace 已创建。
#   4. Vault 中已存在 secret/data/postgres/app，并包含 POSTGRES_PASSWORD。
#
# Vault 中的密码写入示例（仅在密码尚未存在或需要更新时执行）:
#   kubectl exec -n vault vault-0 -- vault kv put secret/postgres/app \
#     POSTGRES_PASSWORD="<postgres-password>"
#
# Vault KV v2 路径说明:
#   Vault 命令使用 secret/postgres/app。
#   ExternalSecret 的 remoteRef.key 必须使用 secret/data/postgres/app。
#
# ESO 生成的 Kubernetes Secret:
#   namespace: qianfu
#   name: qianfu-database
#   key:  url
#   value: postgresql://appuser:<password>@postgres.data.svc.cluster.local:5432/appdb
#
# QianFu API 和数据库迁移 Job 通过 secretKeyRef 读取 qianfu-database.url。
# API 连接池会自动设置 search_path=qianfu,public，避免访问其他项目的表。
#
# 验证 ExternalSecret:
#   kubectl get externalsecret qianfu-database -n qianfu
#   kubectl describe externalsecret qianfu-database -n qianfu
#   kubectl get secret qianfu-database -n qianfu
#
# 只查看 Secret 是否存在，不要在日志或工单中输出密码:
#   kubectl get secret qianfu-database -n qianfu \
#     -o jsonpath='{.data.url}' | base64 -d | sed 's/:.*@/:***@/'
#
# OAuth2 凭据不在这里重复声明。
# QianFu 复用 oauth/k8s/game-proxy-*.yaml 模板，读取 oauth 命名空间中的
# oauth2-proxy-secret；该 Secret 由 vault/inventory/oauth-externalsecret.yaml
# 从 secret/data/oauth/oauth2-proxy 同步。
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qianfu-database
  namespace: qianfu
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: qianfu-database
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        url: postgresql://appuser:{{ .POSTGRES_PASSWORD }}@postgres.data.svc.cluster.local:5432/appdb
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/postgres/app
        property: POSTGRES_PASSWORD
