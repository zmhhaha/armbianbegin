# ============================================================
#  Redis — ExternalSecret
#  从 Vault 同步密码到 data 命名空间
#
#  写入 Vault 的命令:
#   kubectl exec -n vault vault-0 -- vault kv put secret/redis/app \
#     REDIS_PASSWORD="<your-password>"
#
#  验证:
#   kubectl get secret -n data redis-secret -o jsonpath='{.data.REDIS_PASSWORD}' | base64 -d
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secret
  namespace: data
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-secret
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/data/redis/app
        property: REDIS_PASSWORD
