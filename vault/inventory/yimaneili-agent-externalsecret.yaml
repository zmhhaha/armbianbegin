# ============================================================
#  以马内利 Agent — ExternalSecret
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secret
  namespace: yimaneili-agent
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: agent-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/yimaneili-agent/api
        property: OPENAI_API_KEY
    - secretKey: CUSTOM_API_KEY
      remoteRef:
        key: secret/data/yimaneili-agent/api
        property: CUSTOM_API_KEY
