# ============================================================
#  School of One — ExternalSecrets (×4)
#  从 Vault 同步 School of One 应用所有凭据到 school-of-one 命名空间
#
#  ── 写入 Vault ─────────────────────────────────────────
#  kubectl exec -n vault vault-0 -- vault kv put secret/school-of-one/db \
#    DB_URL="postgresql://appuser:密码@postgres.data.svc.cluster.local:5432/school_of_one"
#  kubectl exec -n vault vault-0 -- vault kv put secret/school-of-one/jwt \
#    JWT_SECRET="$(openssl rand -hex 32)"
#  kubectl exec -n vault vault-0 -- vault kv put secret/school-of-one/llm \
#    DEEPSEEK_API_KEY="sk-<你的key>" \
#    OPENAI_API_KEY="sk-<你的key(可选)>"
#  kubectl exec -n vault vault-0 -- vault kv put secret/school-of-one/redis \
#    REDIS_URL="redis://:密码@redis.data.svc.cluster.local:6379/0"
#
#  ── 验证 ───────────────────────────────────────────────
#  kubectl get secret -n school-of-one db-secret    -o jsonpath='{.data.url}' | base64 -d
#  kubectl get secret -n school-of-one jwt-secret   -o jsonpath='{.data.secret}' | base64 -d
#  kubectl get secret -n school-of-one llm-secret   -o jsonpath='{.data.deepseek-api-key}' | base64 -d
#  kubectl get secret -n school-of-one redis-secret -o jsonpath='{.data.url}' | base64 -d
# ============================================================
---
# ── 数据库连接串 ──────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: school-of-one
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: secret/data/school-of-one/db
        property: DB_URL
---
# ── JWT 签名密钥 ─────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: school-of-one
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: secret/data/school-of-one/jwt
        property: JWT_SECRET
---
# ── LLM API Key ──────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-secret
  namespace: school-of-one
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: llm-secret
    creationPolicy: Owner
  data:
    - secretKey: deepseek-api-key
      remoteRef:
        key: secret/data/school-of-one/llm
        property: DEEPSEEK_API_KEY
    - secretKey: openai-api-key
      remoteRef:
        key: secret/data/school-of-one/llm
        property: OPENAI_API_KEY
---
# ── Redis 连接串 ─────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secret
  namespace: school-of-one
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: secret/data/school-of-one/redis
        property: REDIS_URL
