# ============================================================
#  PostgreSQL — ExternalSecret
#  从 Vault 同步数据库密码到 data 命名空间
#
#  写入 Vault 的命令:
#   kubectl exec -n vault vault-0 -- vault kv put secret/postgres/app \
#     POSTGRES_PASSWORD="<your-password>"
#
#  验证:
#   kubectl get secret postgres-secret -n data -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: data
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/postgres/app
        property: POSTGRES_PASSWORD
