# ============================================================
#  Research Agent — ExternalSecret
#  作用: 从 Vault 同步 API Key 到 K8s Secret
#
#  ⚠️ 关于 ConfigMap（agent-config）
#     ESO 此版本（v2.7.0）CRD schema 中没有 template.kind ConfigMap 字段，
#     即使通过 --validate=false 也无法生成 ConfigMap（底层会按默认生成 Secret），
#     因此 ConfigMap 需手动维护，不走 ESO 管理。
#
#  ── 写入 Vault ──────────────────────────────────────────
#  kubectl exec -n vault vault-0 -- vault kv put secret/research-agent/api \
#    OPENAI_API_KEY="sk-xxx" \
#    CUSTOM_API_KEY="sk-xxx"
#
#  ── apply ExternalSecret ──────────────────────────────
#  kubectl apply -f inventory/research-agent-externalsecret.yaml
#
#  ── 强制 ESO 立即同步 ──────────────────────────────────
#  kubectl annotate externalsecret agent-secret -n research-agent \
#    force-sync=$(date +%s) --overwrite
#
#  ── 更新后重启 Pod（环境变量只在 Pod 启动时注入） ──────
#  kubectl rollout restart deployment api -n research-agent
#  kubectl rollout status deployment api -n research-agent
#
#  ── 查看 Secret 内容 ──────────────────────────────────
#  kubectl get secret agent-secret -n research-agent -o jsonpath='{.data}' \
#    | python3 -c "import sys,json,base64; d=json.load(sys.stdin); [print(f'{k}={base64.b64decode(v).decode()}') for k,v in d.items()]"
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secret
  namespace: research-agent
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: agent-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/research-agent/api
        property: OPENAI_API_KEY
    - secretKey: CUSTOM_API_KEY
      remoteRef:
        key: secret/data/research-agent/api
        property: CUSTOM_API_KEY
