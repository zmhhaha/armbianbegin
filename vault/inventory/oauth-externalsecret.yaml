# ============================================================
#  OAuth — ExternalSecret
#  从 Vault 同步 oauth2-proxy 凭证到 K8s Secret
#
#  写入 Vault 的命令:
#   kubectl exec -n vault vault-0 -- vault kv put secret/oauth/oauth2-proxy \
#     COOKIE_SECRET="$(openssl rand -hex 16)" \
#     OIDC_CLIENT_ID="xxx" \
#     OIDC_CLIENT_SECRET="xxx" \
#     OIDC_ISSUER_URL="https://auth.panghuer.top" \
#     ALLOWED_DOMAINS="*"
#
#  ⚠️ COOKIE_SECRET 不能太长：oauth2-proxy 直接用字符串长度判断
#     openssl rand -base64 32 = 44 chars ❌   openssl rand -hex 32 = 64 chars ❌
#     openssl rand -hex 16    = 32 chars ✅
#
#  注意: research-agent 和 scientific-agent 两个 oauth2-proxy
#        实例共用同一个 Secret，一个 ExternalSecret 即可覆盖两个实例
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secret
  namespace: oauth
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secret
    creationPolicy: Owner
  data:
    - secretKey: COOKIE_SECRET
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: COOKIE_SECRET
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: OIDC_CLIENT_ID
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: OIDC_CLIENT_SECRET
    - secretKey: OIDC_ISSUER_URL
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: OIDC_ISSUER_URL
    - secretKey: ALLOWED_DOMAINS
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: ALLOWED_DOMAINS
