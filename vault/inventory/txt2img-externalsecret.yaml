# ============================================================
#  txt2img-proxy — ExternalSecret
#  从 Vault 同步各平台凭证到统一的 K8s Secret
#
#  ark 使用 AK/SK（SigV4 签名），其他平台使用 API Key
#
#  ── 写入 Vault ──────────────────────────────────────────
#  kubectl exec -n vault vault-0 -- vault kv put secret/txt2img/ark \
#    ARK_ACCESS_KEY="<你的 AccessKey>" \
#    ARK_SECRET_KEY="<你的 SecretKey>"
#
#  ── apply ───────────────────────────────────────────────
#  kubectl apply -f inventory/txt2img-externalsecret.yaml
#
#  ── 强制同步 ────────────────────────────────────────────
#  kubectl annotate externalsecret txt2img-api-keys -n txt2img \
#    force-sync=$(date +%s) --overwrite
#
#  ── 更新后重启 Pod ────────────────────────────────────
#  kubectl rollout restart deployment txt2img-proxy -n txt2img
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: txt2img-api-keys
  namespace: txt2img
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: txt2img-api-keys
    creationPolicy: Owner
  data:
    # ── 火山引擎视觉 CV（AK/SK 签名，当前使用的平台） ──
    - secretKey: ARK_ACCESS_KEY
      remoteRef:
        key: secret/data/txt2img/ark
        property: ARK_ACCESS_KEY
    - secretKey: ARK_SECRET_KEY
      remoteRef:
        key: secret/data/txt2img/ark
        property: ARK_SECRET_KEY
    # ── 其他平台可在此追加 ──
