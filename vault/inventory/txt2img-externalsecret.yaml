# ============================================================
#  txt2img-proxy — ExternalSecret
#  从 Vault 同步各平台 API Key 到统一的 K8s Secret
#
#  一个 Secret 包含所有平台的 Key，每个 Key 名即环境变量名。
#  Deployment 中配置了所有环境变量，但只读取当前
#  PROVIDER 对应的那个，其余 unused 但不影响。
#
#  ── 写入 Vault（每个平台独立路径） ─────────────────────
#  kubectl exec -n vault vault-0 -- vault kv put secret/txt2img/ark \
#    ARK_API_KEY="<火山引擎方舟 Key>"
#  kubectl exec -n vault vault-0 -- vault kv put secret/txt2img/openai \
#    OPENAI_API_KEY="sk-xxx"
#
#  ── apply ───────────────────────────────────────────────
#  kubectl apply -f inventory/txt2img-externalsecret.yaml
#
#  ── 强制同步 ────────────────────────────────────────────
#  kubectl annotate externalsecret txt2img-api-keys -n txt2img \
#    force-sync=$(date +%s) --overwrite
#
#  ── 更新后重启 Pod ────────────────────────────────────
#  kubectl rollout restart deployment txt2img-proxy -n txt2img
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: txt2img-api-keys
  namespace: txt2img
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: txt2img-api-keys
    creationPolicy: Owner
  data:
    # ── 火山引擎方舟 ──────────────────────────────
    - secretKey: ARK_API_KEY
      remoteRef:
        key: secret/data/txt2img/ark
        property: ARK_API_KEY
    # ── Replicate ──────────────────────────────────
    - secretKey: REPLICATE_API_KEY
      remoteRef:
        key: secret/data/txt2img/replicate
        property: REPLICATE_API_KEY
    # ── Together AI ────────────────────────────────
    - secretKey: TOGETHER_API_KEY
      remoteRef:
        key: secret/data/txt2img/together
        property: TOGETHER_API_KEY
    # ── Stability AI ───────────────────────────────
    - secretKey: STABILITY_API_KEY
      remoteRef:
        key: secret/data/txt2img/stability
        property: STABILITY_API_KEY
    # ── OpenAI ─────────────────────────────────────
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/txt2img/openai
        property: OPENAI_API_KEY
