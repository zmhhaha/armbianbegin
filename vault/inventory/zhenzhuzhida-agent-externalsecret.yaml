# ============================================================
#  真主至大 Agent — ExternalSecret
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secret
  namespace: zhenzhuzhida-agent
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: agent-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/zhenzhuzhida-agent/api
        property: OPENAI_API_KEY
    - secretKey: CUSTOM_API_KEY
      remoteRef:
        key: secret/data/zhenzhuzhida-agent/api
        property: CUSTOM_API_KEY
