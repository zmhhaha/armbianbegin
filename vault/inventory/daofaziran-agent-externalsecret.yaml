# ============================================================
#  道法自然 Agent — ExternalSecret
#  作用: 从 Vault 同步 API Key 到 K8s Secret
#
#  用法:
#  ── 写入 Vault ──────────────────────────────────────────
#  kubectl exec -n vault vault-0 -- vault kv put secret/daofaziran-agent/api \
#    OPENAI_API_KEY="sk-xxx" \
#    CUSTOM_API_KEY="sk-xxx"
#
#  ── apply ExternalSecret ──────────────────────────────
#  kubectl apply -f inventory/daofaziran-agent-externalsecret.yaml
#
#  ── 强制 ESO 立即同步 ──────────────────────────────────
#  kubectl annotate externalsecret agent-secret -n daofaziran-agent \
#    force-sync=$(date +%s) --overwrite
#
#  ── 更新后重启 Pod ─────────────────────────────────────
#  kubectl rollout restart deployment api -n daofaziran-agent
#  kubectl rollout status deployment api -n daofaziran-agent
#
#  ── 查看 Secret 内容 ──────────────────────────────────
#  kubectl get secret agent-secret -n daofaziran-agent -o jsonpath='{.data}' \
#    | python3 -c "import sys,json,base64; d=json.load(sys.stdin); [print(f'{k}={base64.b64decode(v).decode()}') for k,v in d.items()]"
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secret
  namespace: daofaziran-agent
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: agent-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/daofaziran-agent/api
        property: OPENAI_API_KEY
    - secretKey: CUSTOM_API_KEY
      remoteRef:
        key: secret/data/daofaziran-agent/api
        property: CUSTOM_API_KEY
