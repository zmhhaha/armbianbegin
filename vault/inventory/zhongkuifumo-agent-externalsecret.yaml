# ============================================================
#  钟馗伏魔 Agent — ExternalSecret
#  作用: 从 Vault 同步 API Key 到 K8s Secret
#
#  用法:
#  ── 写入 Vault ──────────────────────────────────────────
#  kubectl exec -n vault vault-0 -- vault kv put secret/zhongkuifumo-agent/api \
#    OPENAI_API_KEY="sk-xxx" \
#    CUSTOM_API_KEY="sk-xxx"
#
#  ── apply ExternalSecret ──────────────────────────────
#  kubectl apply -f inventory/zhongkuifumo-agent-externalsecret.yaml
#
#  ── 强制 ESO 立即同步 ──────────────────────────────────
#  kubectl annotate externalsecret agent-secret -n zhongkuifumo-agent \
#    force-sync=$(date +%s) --overwrite
#
#  ── 更新后重启 Pod ─────────────────────────────────────
#  kubectl rollout restart deployment api -n zhongkuifumo-agent
#  kubectl rollout status deployment api -n zhongkuifumo-agent
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secret
  namespace: zhongkuifumo-agent
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: agent-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/zhongkuifumo-agent/api
        property: OPENAI_API_KEY
    - secretKey: CUSTOM_API_KEY
      remoteRef:
        key: secret/data/zhongkuifumo-agent/api
        property: CUSTOM_API_KEY
