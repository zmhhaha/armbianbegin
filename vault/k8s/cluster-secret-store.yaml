# ============================================================
# ClusterSecretStore — 全局 Vault 后端连接配置
# 作用: 定义 External Secrets Operator 如何连接到 Vault
# 生效范围: 整个集群所有命名空间均可引用
# 认证方式: Kubernetes Auth（ESO 用 ServiceAccount JWT 请求 Vault）
# ============================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # Vault 服务地址（集群内部 DNS）
      server: "http://vault.vault.svc.cluster.local:8200"
      # KV v2 引擎路径
      path: "secret"
      # KV 引擎版本
      version: "v2"
      auth:
        # Kubernetes 认证方式 — ESO 使用自身的 ServiceAccount JWT
        kubernetes:
          # Vault 中 Kubernetes auth 的挂载路径
          mountPath: "kubernetes"
          # Vault 中创建的 role 名称（见 scripts/init-vault.sh）
          role: "eso-role"
          # ESO 使用的 ServiceAccount（默认由 Helm chart 创建）
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
