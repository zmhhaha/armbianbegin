# ============================================================
# ExternalSecret 示例 — oauth2-proxy 凭证
# 说明: 这个示例展示了如何将 Vault 中的 secret 同步到 K8s Secret
#
# ⚠️ KV v2 路径重要提示：
#   Vault KV v2 引擎的实际存储路径格式为: secret/data/<path>
#   所以 remoteRef.key 要写成: secret/data/oauth/oauth2-proxy
#   但写入时 vault kv put 命令会自动加 data/，所以写命令时不加：
#     正确:  vault kv put secret/oauth/oauth2-proxy KEY=VAL
#     错误:  vault kv put secret/data/oauth/oauth2-proxy KEY=VAL  ← 会变成 secret/data/data/...
#     读取:  vault kv get secret/data/oauth/oauth2-proxy
#     在 ExternalSecret remoteRef.key 中: secret/data/oauth/oauth2-proxy
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secret
  namespace: oauth
spec:
  refreshInterval: "1h"           # 每隔 1 小时检查 Vault 是否有变化
  secretStoreRef:
    name: vault-backend           # 引用 ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secret      # 目标 K8s Secret 名称（与现有 YAML 同名）
    creationPolicy: Owner          # ESO 管理此 Secret 的生命周期
  data:
    - secretKey: COOKIE_SECRET
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: COOKIE_SECRET
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: OIDC_CLIENT_ID
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: OIDC_CLIENT_SECRET
    - secretKey: OIDC_ISSUER_URL
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: OIDC_ISSUER_URL
    - secretKey: ALLOWED_DOMAINS
      remoteRef:
        key: secret/data/oauth/oauth2-proxy
        property: ALLOWED_DOMAINS
---
# ============================================================
# ExternalSecret 示例 — Agent API Key
# 说明: 将 API Key 同步到 panghu_agent 命名空间
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secret
  namespace: research-agent       # 注意: 替换为实际命名空间
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: agent-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/research-agent/api
        property: OPENAI_API_KEY
    - secretKey: CUSTOM_API_KEY
      remoteRef:
        key: secret/data/research-agent/api
        property: CUSTOM_API_KEY
---
# ============================================================
# ExternalSecret 示例 — Email Service SMTP
# ============================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: email-secret
  namespace: email-service
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: email-secret
    creationPolicy: Owner
  data:
    - secretKey: SMTP_USER
      remoteRef:
        key: secret/data/email-service/smtp
        property: SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: secret/data/email-service/smtp
        property: SMTP_PASS
