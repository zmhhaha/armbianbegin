# ============================================================
# Vault 数据持久卷声明
# 存储后端: Ceph RBD（请根据实际存储类修改 storageClassName）
# 大小: 10Gi（可根据实际需要调整）
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ceph-rbd
