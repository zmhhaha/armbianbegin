# ============================================================
#  Generic Agent API 部署模板
#  deploy.sh 会将 __AGENT_NAME__ 替换为实际 agent 名
#  示例: AGENT_NAME=research-agent
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: __AGENT_NAME__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: __AGENT_NAME__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __AGENT_NAME__-api
  template:
    metadata:
      labels:
        app: __AGENT_NAME__-api
    spec:
      containers:
      - name: api
        image: arm-cluster-master:5000/agent-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: PROVIDER
          value: deepseek
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-secret
              key: OPENAI_API_KEY
              optional: true
        resources:
          requests: {cpu: 250m, memory: 512Mi}
          limits: {cpu: 2000m, memory: 2Gi}
        livenessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: __AGENT_NAME__
spec:
  selector:
    app: __AGENT_NAME__-api
  ports:
  - port: 80
    targetPort: 8000
