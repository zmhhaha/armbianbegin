# ============================================================
#  FastAPI K8s 部署模板
#  替换所有 <...> 占位符为你的实际值
# ============================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: fastapi-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: fastapi-app
data:
  APP_MODULE: "app.main:app"          # uvicorn 启动模块
  API_PORT: "8000"
  # 其他业务配置放这里
---
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secret
  namespace: fastapi-app
type: Opaque
stringData:
  # 密钥放这里，例如:
  # OPENAI_API_KEY: "sk-xxx"
  # DATABASE_URL: "postgresql://..."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: fastapi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-app
  template:
    metadata:
      labels:
        app: fastapi-app
    spec:
      containers:
      - name: fastapi
        image: arm-cluster-master:5000/fastapi-app:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
        envFrom:
        - configMapRef:
            name: fastapi-config
        - secretRef:
            name: fastapi-secret
        resources:
          requests: {cpu: 250m, memory: 256Mi}
          limits:   {cpu: 1000m, memory: 1Gi}
        livenessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-app
  namespace: fastapi-app
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: fastapi-app
