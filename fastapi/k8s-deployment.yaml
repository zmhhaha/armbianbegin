---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: fastapi-agent
---
# ConfigMap — 模型配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-agent-config
  namespace: fastapi-agent
data:
  PROVIDER: "deepseek"
  API_PORT: "8000"
---
# Secret — API Key（部署前替换为真实值）
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-agent-secret
  namespace: fastapi-agent
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-your-api-key-here"
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-agent
  namespace: fastapi-agent
  labels:
    app: fastapi-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-agent
  template:
    metadata:
      labels:
        app: fastapi-agent
    spec:
      containers:
      - name: fastapi-agent
        image: arm-cluster-master:5000/fastapi-agent:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
        envFrom:
        - configMapRef:
            name: fastapi-agent-config
        - secretRef:
            name: fastapi-agent-secret
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: fastapi-agent
  namespace: fastapi-agent
  labels:
    app: fastapi-agent
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: fastapi-agent
